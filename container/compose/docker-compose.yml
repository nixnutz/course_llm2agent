services:
  certs_init:
    image: golang:alpine
    hostname: certs-init
    entrypoint:
      - /bin/sh
      - /init/local.sh
    volumes:
      - ./.state/certs:/certs:z
      - ./init/certs/local.sh:/init/local.sh:ro,z
    environment:
      CERT_HOSTS: "${CERT_HOSTS:-localhost 127.0.0.1 ::1 caddy litellm phoenix ollama postgres dev}"
    networks:
      - backend_core
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: pgvector/pgvector:pg16
    hostname: postgres
    environment:
      POSTGRES_DB: "${POSTGRES_LITELLM_DB}"
      POSTGRES_USER: "${POSTGRES_LITELLM_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_LITELLM_PASSWORD}"
    ports:
      - "${HOST_BIND_IP}:${POSTGRES_PORT}:5432"
    volumes:
      - ./.state/postgres_data:/var/lib/postgresql/data:z
      - ./init/postgres/01-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro,z
    networks:
      - backend_core
      - dev_edge
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_LITELLM_USER} -d ${POSTGRES_LITELLM_DB}" ]
      interval: "${HEALTHCHECK_INTERVAL_BOOT:-${HEALTHCHECK_INTERVAL}}"
      timeout: 5s
      retries: 60
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres_init_identities:
    image: pgvector/pgvector:pg16
    hostname: postgres-init-identities
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - /init/role-bootstrap.sh
    volumes:
      - ./init/postgres/role-bootstrap.sh:/init/role-bootstrap.sh:ro,z
    networks:
      - backend_core
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "${POSTGRES_PORT}"
      POSTGRES_ADMIN_DB: "${POSTGRES_LITELLM_DB}"
      POSTGRES_ADMIN_USER: "${POSTGRES_LITELLM_USER}"
      POSTGRES_ADMIN_PASSWORD: "${POSTGRES_LITELLM_PASSWORD}"
      LITELLM_DB: "${POSTGRES_LITELLM_DB}"
      LITELLM_USER: "${POSTGRES_LITELLM_USER}"
      LITELLM_PASSWORD: "${POSTGRES_LITELLM_PASSWORD}"
      PHOENIX_DB: "${POSTGRES_PHOENIX_DB}"
      PHOENIX_USER: "${POSTGRES_PHOENIX_USER}"
      PHOENIX_PASSWORD: "${POSTGRES_PHOENIX_PASSWORD}"
      TOOLBERT_DB: "${POSTGRES_TOOLBERT_DB}"
      TOOLBERT_USER: "${POSTGRES_TOOLBERT_USER}"
      TOOLBERT_PASSWORD: "${POSTGRES_TOOLBERT_PASSWORD}"

  ollama:
    image: ollama/ollama:latest
    hostname: ollama
    init: true
    stop_signal: SIGTERM
    volumes:
      - ${OLLAMA_DATA_DIR}:/root/.ollama:z
    networks:
      - backend_core
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "ollama list >/dev/null 2>&1" ]
      interval: "${HEALTHCHECK_INTERVAL}"
      start_interval: "${HEALTHCHECK_INTERVAL_BOOT:-3s}"
      timeout: 5s
      retries: 60
      start_period: 30s
    environment:
      OLLAMA_DEBUG: "${OLLAMA_DEBUG:-0}"
      OLLAMA_NUM_PARALLEL: "${OLLAMA_NUM_PARALLEL:-1}"
      OLLAMA_MAX_QUEUE: "${OLLAMA_MAX_QUEUE:-8}"
      OLLAMA_MAX_LOADED_MODELS: "${OLLAMA_MAX_LOADED_MODELS:-0}"
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-5m}"

  ollama_init_models:
    image: ollama/ollama:latest
    hostname: ollama-init-models
    entrypoint: [ "/bin/sh", "/init/models.sh" ]
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ${OLLAMA_DATA_DIR}:/root/.ollama:z
      - ./init/ollama/models.sh:/init/models.sh:ro,z
    networks:
      - backend_core
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # Make the ollama CLI talk to the "ollama" service container.
      OLLAMA_DEBUG: "${OLLAMA_DEBUG:-0}"
      OLLAMA_HOST: "${OLLAMA_HOST}"
      OLLAMA_MODELS: "${OLLAMA_MODELS}"
      OLLAMA_INIT_MODE: "${OLLAMA_INIT_MODE}"
      OLLAMA_PULL_OPTIONS: "${OLLAMA_PULL_OPTIONS}"
      OLLAMA_RUN_OPTIONS: "${OLLAMA_RUN_OPTIONS}"
      OLLAMA_RUN_PROMPT: "${OLLAMA_RUN_PROMPT}"
      OLLAMA_RETRY_MAX_ATTEMPTS: "${OLLAMA_RETRY_MAX_ATTEMPTS:-0}"
      OLLAMA_MAX_LOADED_MODELS: "${OLLAMA_MAX_LOADED_MODELS:-0}"

  litellm_keys_file_gate:
    image: alpine:3
    hostname: litellm-keys-file-gate
    entrypoint:
      - /bin/sh
      - -lc
      - apk add --no-cache bash python3 >/dev/null && /workspace/init-keys/validate.sh
    depends_on:
      postgres:
        condition: service_healthy
      ollama_init_models:
        condition: service_completed_successfully
    volumes:
      - ./init/keys:/workspace/init-keys:ro,z
      - ./.state/keys:/workspace/keys:rw,z
    networks:
      - backend_core
    working_dir: /workspace
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      KEYS_FILE: "/workspace/keys/keys.local.json"

  litellm_clean:
    image: ghcr.io/berriai/litellm:main-stable
    hostname: litellm-clean
    platform: "${LITELLM_PLATFORM}"
    init: true
    stop_signal: SIGTERM
    depends_on:
      certs_init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      postgres_init_identities:
        condition: service_completed_successfully
      ollama_init_models:
        condition: service_completed_successfully
      litellm_keys_file_gate:
        condition: service_completed_successfully
      phoenix:
        condition: service_started
    volumes:
      - ./config/litellm/litellm.yaml:/app/config.yaml:ro,z
    networks:
      - backend_core
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      UI_USERNAME: "${UI_USERNAME}"
      UI_PASSWORD: "${UI_PASSWORD}"
      ROOT_REDIRECT_URL: "/ui"
      FORWARDED_ALLOW_IPS: "*"
      JSON_LOGS: "${JSON_LOGS}"
      OLLAMA_API_BASE: "${OLLAMA_API_BASE_CLEAN}"
      LITELLM_DEFAULT_TIMEOUT: "${LITELLM_DEFAULT_TIMEOUT}"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY}"
      PHOENIX_COLLECTOR_HTTP_ENDPOINT: "${PHOENIX_COLLECTOR_HTTP_ENDPOINT:-}"
      PHOENIX_PROJECT_NAME: "${PHOENIX_PROJECT_NAME_CLEAN:-${PHOENIX_PROJECT_NAME:-}}"
      PHOENIX_API_KEY: "${PHOENIX_API_KEY:-}"
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${LITELLM_INTERNAL_PORT}/health/readiness', timeout=2)\"" ]
      interval: "${HEALTHCHECK_INTERVAL}"
      start_interval: "${HEALTHCHECK_INTERVAL_BOOT:-3s}"
      timeout: 5s
      retries: 60
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: [ "--config", "/app/config.yaml", "--port", "${LITELLM_INTERNAL_PORT}", "--request_timeout", "${LITELLM_DEFAULT_TIMEOUT}" ]

  litellm_chaos:
    image: ghcr.io/berriai/litellm:main-stable
    hostname: litellm-chaos
    platform: "${LITELLM_PLATFORM}"
    init: true
    stop_signal: SIGTERM
    depends_on:
      certs_init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      postgres_init_identities:
        condition: service_completed_successfully
      ollama_init_models:
        condition: service_completed_successfully
      litellm_keys_file_gate:
        condition: service_completed_successfully
      phoenix:
        condition: service_started
      toxiproxy:
        condition: service_started
    volumes:
      - ./config/litellm/litellm.yaml:/app/config.yaml:ro,z
    networks:
      - backend_core
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      UI_USERNAME: "${UI_USERNAME}"
      UI_PASSWORD: "${UI_PASSWORD}"
      ROOT_REDIRECT_URL: "/ui"
      FORWARDED_ALLOW_IPS: "*"
      JSON_LOGS: "${JSON_LOGS}"
      OLLAMA_API_BASE: "${OLLAMA_API_BASE_CHAOS}"
      LITELLM_DEFAULT_TIMEOUT: "${LITELLM_DEFAULT_TIMEOUT}"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY}"
      PHOENIX_COLLECTOR_HTTP_ENDPOINT: "${PHOENIX_COLLECTOR_HTTP_ENDPOINT:-}"
      PHOENIX_PROJECT_NAME: "${PHOENIX_PROJECT_NAME_CHAOS:-${PHOENIX_PROJECT_NAME:-}}"
      PHOENIX_API_KEY: "${PHOENIX_API_KEY:-}"
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${LITELLM_INTERNAL_PORT}/health/readiness', timeout=2)\"" ]
      interval: "${HEALTHCHECK_INTERVAL}"
      start_interval: "${HEALTHCHECK_INTERVAL_BOOT:-3s}"
      timeout: 5s
      retries: 60
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: [ "--config", "/app/config.yaml", "--port", "${LITELLM_INTERNAL_PORT}", "--request_timeout", "${LITELLM_DEFAULT_TIMEOUT}" ]

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:latest
    hostname: toxiproxy
    command: [ "-host=0.0.0.0" ]
    ports:
      - "${HOST_BIND_IP}:${TOXIPROXY_ADMIN_PORT:-8474}:8474"
    networks:
      - backend_core
      - dev_edge
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  toxiproxy_bootstrap:
    image: alpine:3
    hostname: toxiproxy-bootstrap
    depends_on:
      toxiproxy:
        condition: service_started
      litellm_chaos:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -lc
      - apk add --no-cache bash curl >/dev/null && bash /workspace/init-toxiproxy/bootstrap.sh
    volumes:
      - ./init/toxiproxy:/workspace/init-toxiproxy:ro,z
    networks:
      - backend_core
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      TOXIPROXY_URL: "${TOXIPROXY_URL}"
      TOXIPROXY_EDGE_LISTEN: "${TOXIPROXY_EDGE_LISTEN:-11111}"
      TOXIPROXY_OLLAMA_LISTEN: "${TOXIPROXY_OLLAMA_LISTEN:-11112}"
      LITELLM_INTERNAL_PORT: "${LITELLM_INTERNAL_PORT}"
      LITELLM_CHAOS_HOST: "litellm_chaos"
      OLLAMA_CONTAINER_PORT: "${OLLAMA_CONTAINER_PORT:-11434}"

  litellm_init_keys:
    image: alpine:3
    hostname: litellm-init-keys
    entrypoint:
      - /bin/sh
      - -lc
      - apk add --no-cache bash curl jq python3 >/dev/null && /workspace/init-keys/virtual.sh
    depends_on:
      litellm_clean:
        condition: service_healthy
    volumes:
      - ./init/keys:/workspace/init-keys:ro,z
      - ./scripts/keys/virtual-keys.sh:/workspace/virtual-keys.sh:ro,z
      - ./.state/keys:/workspace/keys:rw,z
    networks:
      - backend_core
    working_dir: /workspace
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      LITELLM_HOST: "litellm_clean"
      LITELLM_PORT: "${LITELLM_INTERNAL_PORT}"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      KEYS_INIT_MODE: "${KEYS_INIT_MODE:-required}"
      KEYS_FILE: "/workspace/keys/keys.local.json"

  caddy:
    image: caddy:2
    hostname: caddy
    depends_on:
      certs_init:
        condition: service_completed_successfully
      litellm_clean:
        condition: service_healthy
      toxiproxy_bootstrap:
        condition: service_completed_successfully
    ports:
      - "${HOST_BIND_IP}:${LITELLM_PORT}:4000"
      - "${HOST_BIND_IP}:${LITELLM_CHAOS_PORT:-4001}:4001"
      - "${HOST_BIND_IP}:${PHOENIX_UI_TLS_PORT:-6006}:6006"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro,z
      - ./.state/certs:/certs:ro,z
    networks:
      - dev_edge
      - backend_core
    environment:
      LITELLM_INTERNAL_PORT: "${LITELLM_INTERNAL_PORT}"
      TOXIPROXY_EDGE_LISTEN: "${TOXIPROXY_EDGE_LISTEN:-11111}"
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  phoenix:
    image: arizephoenix/phoenix:latest
    hostname: phoenix
    ports:
      - "${HOST_BIND_IP}:${PHOENIX_OTLP_GRPC_PORT:-4317}:4317"
    environment:
      PHOENIX_WORKING_DIR: "${PHOENIX_WORKING_DIR:-/mnt/data}"
      PHOENIX_SQL_DATABASE_URL: "postgresql://${POSTGRES_PHOENIX_USER}:${POSTGRES_PHOENIX_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_PHOENIX_DB}"
    volumes:
      - ./.state/phoenix_data:${PHOENIX_WORKING_DIR:-/mnt/data}:z
    networks:
      - backend_core
    depends_on:
      postgres:
        condition: service_healthy
      postgres_init_identities:
        condition: service_completed_successfully
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dev:
    image: ${DEV_IMAGE_NAME:-course-llm-dev:v1}
    hostname: dev
    depends_on:
      certs_init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      postgres_init_identities:
        condition: service_completed_successfully
      ollama_init_models:
        condition: service_completed_successfully
      litellm_keys_file_gate:
        condition: service_completed_successfully
      litellm_clean:
        condition: service_started
      toxiproxy_bootstrap:
        condition: service_completed_successfully
      caddy:
        condition: service_started
      phoenix:
        condition: service_started
    working_dir: /workspace/src
    ports:
      - "${HOST_BIND_IP}:${DEV_JUPYTER_PORT:-8888}:8888"
      - "${HOST_BIND_IP}:${DEV_STREAMLIT_PORT:-8501}:8501"
    volumes:
      - ../../src:/workspace/src:z
      - ./.state/certs:/certs:ro,z
      - ./scripts:/workspace/compose-scripts:ro,z
      - ./.state/keys:/workspace/compose-state/keys:ro,z
    networks:
      - dev_edge
      - backend_core
    environment:
      JUPYTER_TOKEN: "${JUPYTER_TOKEN:?Set JUPYTER_TOKEN in container/compose/.env}"
      KEYS_FILE: "/workspace/compose-state/keys/keys.local.json"
      DEV_SECRETS_EXPORTER: "/workspace/compose-scripts/dev/export-secrets-env.sh"
      DEV_SECRETS_ENV_FILE: "/tmp/dev-secrets.env.sh"
      DEV_KEYS_STRICT: "${DEV_KEYS_STRICT:-1}"
      MODEL_BASE_URL_CLEAN: "${MODEL_BASE_URL_CLEAN}"
      MODEL_BASE_URL_CHAOS: "${MODEL_BASE_URL_CHAOS}"
      TOXIPROXY_URL: "${TOXIPROXY_URL}"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "${POSTGRES_PORT}"
      POSTGRES_TOOLBERT_DB: "${POSTGRES_TOOLBERT_DB}"
      POSTGRES_TOOLBERT_USER: "${POSTGRES_TOOLBERT_USER}"
      POSTGRES_TOOLBERT_PASSWORD: "${POSTGRES_TOOLBERT_PASSWORD}"
      PHOENIX_COLLECTOR_ENDPOINT: "${PHOENIX_COLLECTOR_ENDPOINT}"
      PHOENIX_PROJECT_NAME: "${PHOENIX_APP_PROJECT_NAME}"
    restart: unless-stopped
    stop_grace_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  dev_edge:
    name: compose_dev_edge
  backend_core:
    name: compose_backend_core
