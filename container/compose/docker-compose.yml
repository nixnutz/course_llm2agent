services:
  certs_init:
    image: golang:alpine
    hostname: certs-init
    entrypoint:
      - /bin/sh
      - /init/init-local-certs.sh
    volumes:
      - ./.state/certs:/certs:z
      - ./scripts/init-local-certs.sh:/init/init-local-certs.sh:ro,z
    environment:
      CERT_HOSTS: "${CERT_HOSTS:-localhost 127.0.0.1 ::1 caddy litellm phoenix ollama postgres dev}"
    networks:
      - backend_core
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB_LITELLM}"
      POSTGRES_USER: "${POSTGRES_USER_LITELLM}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD_LITELLM}"
    ports:
      - "${HOST_BIND_IP}:${POSTGRES_PORT}:5432"
    volumes:
      - ./.state/postgres_data:/var/lib/postgresql/data:z
    networks:
      - backend_core
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_LITELLM} -d ${POSTGRES_DB_LITELLM}"]
      interval: "${HEALTHCHECK_INTERVAL_BOOT:-${HEALTHCHECK_INTERVAL}}"
      timeout: 5s
      retries: 60
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres_init_identities:
    image: postgres:16-alpine
    hostname: postgres-init-identities
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - /init/init-postgres-identities.sh
    volumes:
      - ./scripts/init-postgres-identities.sh:/init/init-postgres-identities.sh:ro,z
    networks:
      - backend_core
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "${POSTGRES_PORT}"
      POSTGRES_ADMIN_DB: "${POSTGRES_DB_LITELLM}"
      POSTGRES_ADMIN_USER: "${POSTGRES_USER_LITELLM}"
      POSTGRES_ADMIN_PASSWORD: "${POSTGRES_PASSWORD_LITELLM}"
      LITELLM_DB: "${POSTGRES_DB_LITELLM}"
      LITELLM_USER: "${POSTGRES_USER_LITELLM}"
      LITELLM_PASSWORD: "${POSTGRES_PASSWORD_LITELLM}"
      PHOENIX_DB: "${POSTGRES_DB_PHOENIX}"
      PHOENIX_USER: "${POSTGRES_USER_PHOENIX}"
      PHOENIX_PASSWORD: "${POSTGRES_PASSWORD_PHOENIX}"

  ollama:
    image: ollama/ollama:latest
    hostname: ollama
    init: true
    stop_signal: SIGTERM
    volumes:
      - ${OLLAMA_DATA_DIR}:/root/.ollama:z
    networks:
      - backend_core
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: "${HEALTHCHECK_INTERVAL}"
      start_interval: "${HEALTHCHECK_INTERVAL_BOOT:-3s}"
      timeout: 5s
      retries: 60
      start_period: 30s

  ollama_init_models:
    image: ollama/ollama:latest
    hostname: ollama-init-models
    entrypoint: ["/bin/sh", "/init/init-ollama-models.sh"]
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ${OLLAMA_DATA_DIR}:/root/.ollama:z
      - ./scripts/init-ollama-models.sh:/init/init-ollama-models.sh:ro,z
    networks:
      - backend_core
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # Make the ollama CLI talk to the "ollama" service container.
      OLLAMA_HOST: "${OLLAMA_HOST}"
      OLLAMA_MODELS: "${OLLAMA_MODELS}"
      OLLAMA_INIT_MODE: "${OLLAMA_INIT_MODE}"
      OLLAMA_PULL_OPTIONS: "${OLLAMA_PULL_OPTIONS}"
      OLLAMA_RUN_OPTIONS: "${OLLAMA_RUN_OPTIONS}"
      OLLAMA_RUN_PROMPT: "${OLLAMA_RUN_PROMPT}"
      OLLAMA_RETRY_MAX_ATTEMPTS: "${OLLAMA_RETRY_MAX_ATTEMPTS:-0}"

  litellm_keys_file_gate:
    image: alpine:3
    hostname: litellm-keys-file-gate
    entrypoint:
      - /bin/sh
      - -lc
      - apk add --no-cache bash python3 >/dev/null && /workspace/scripts/validate-keys-local-json.sh
    depends_on:
      postgres:
        condition: service_healthy
      ollama_init_models:
        condition: service_completed_successfully
    volumes:
      - ./scripts:/workspace/scripts:ro,z
      - ./.state/keys:/workspace/keys:rw,z
    networks:
      - backend_core
    working_dir: /workspace
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      KEYS_FILE: "/workspace/keys/keys.local.json"

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    hostname: litellm
    platform: "${LITELLM_PLATFORM}"
    init: true
    stop_signal: SIGTERM
    depends_on:
      certs_init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      postgres_init_identities:
        condition: service_completed_successfully
      ollama_init_models:
        condition: service_completed_successfully
      litellm_keys_file_gate:
        condition: service_completed_successfully
      phoenix:
        condition: service_started
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro,z
    networks:
      - backend_core
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      UI_USERNAME: "${UI_USERNAME}"
      UI_PASSWORD: "${UI_PASSWORD}"
      ROOT_REDIRECT_URL: "/ui"
      FORWARDED_ALLOW_IPS: "*"
      JSON_LOGS: "${JSON_LOGS}"
      OLLAMA_API_BASE: "${OLLAMA_API_BASE}"
      LITELLM_DEFAULT_TIMEOUT: "${LITELLM_DEFAULT_TIMEOUT}"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY}"
      PHOENIX_COLLECTOR_HTTP_ENDPOINT: "${PHOENIX_COLLECTOR_HTTP_ENDPOINT:-}"
      PHOENIX_PROJECT_NAME: "${PHOENIX_PROJECT_NAME:-}"
      PHOENIX_API_KEY: "${PHOENIX_API_KEY:-}"
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${LITELLM_INTERNAL_PORT}/health/readiness', timeout=2)\""]
      interval: "${HEALTHCHECK_INTERVAL}"
      start_interval: "${HEALTHCHECK_INTERVAL_BOOT:-3s}"
      timeout: 5s
      retries: 60
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: ["--config", "/app/config.yaml", "--port", "${LITELLM_INTERNAL_PORT}", "--request_timeout", "${LITELLM_DEFAULT_TIMEOUT}"]

  litellm_init_keys:
    image: alpine:3
    hostname: litellm-init-keys
    entrypoint:
      - /bin/sh
      - -lc
      - apk add --no-cache bash curl jq python3 >/dev/null && /workspace/scripts/init-virtual-keys.sh
    depends_on:
      litellm:
        condition: service_healthy
    volumes:
      - ./scripts:/workspace/scripts:ro,z
      - ./.state/keys:/workspace/keys:rw,z
    networks:
      - backend_core
    working_dir: /workspace
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      LITELLM_HOST: "litellm"
      LITELLM_PORT: "${LITELLM_INTERNAL_PORT}"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      KEYS_INIT_MODE: "${KEYS_INIT_MODE:-required}"
      KEYS_FILE: "/workspace/keys/keys.local.json"

  caddy:
    image: caddy:2
    hostname: caddy
    depends_on:
      certs_init:
        condition: service_completed_successfully
      litellm:
        condition: service_healthy
    ports:
      - "${HOST_BIND_IP}:${LITELLM_PORT}:4000"
      - "${HOST_BIND_IP}:${PHOENIX_UI_TLS_PORT:-6006}:6006"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro,z
      - ./.state/certs:/certs:ro,z
    networks:
      - dev_edge
      - backend_core
    environment:
      LITELLM_INTERNAL_PORT: "${LITELLM_INTERNAL_PORT}"
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  phoenix:
    image: arizephoenix/phoenix:latest
    hostname: phoenix
    ports:
      - "${HOST_BIND_IP}:${PHOENIX_OTLP_GRPC_PORT:-4317}:4317"
    environment:
      PHOENIX_WORKING_DIR: "${PHOENIX_WORKING_DIR:-/mnt/data}"
      PHOENIX_SQL_DATABASE_URL: "postgresql://${POSTGRES_USER_PHOENIX}:${POSTGRES_PASSWORD_PHOENIX}@postgres:${POSTGRES_PORT}/${POSTGRES_DB_PHOENIX}"
    volumes:
      - ./.state/phoenix_data:${PHOENIX_WORKING_DIR:-/mnt/data}:z
    networks:
      - backend_core
    depends_on:
      postgres:
        condition: service_healthy
      postgres_init_identities:
        condition: service_completed_successfully
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dev:
    image: ${DEV_IMAGE_NAME:-course-llm-dev:v1}
    hostname: dev
    depends_on:
      certs_init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      postgres_init_identities:
        condition: service_completed_successfully
      ollama_init_models:
        condition: service_completed_successfully
      litellm_keys_file_gate:
        condition: service_completed_successfully
      litellm:
        condition: service_started
      caddy:
        condition: service_started
      phoenix:
        condition: service_started
    working_dir: /workspace/src
    ports:
      - "${HOST_BIND_IP}:${DEV_JUPYTER_PORT:-8888}:8888"
    volumes:
      - ../../src:/workspace/src:z
      - ./.state/certs:/certs:ro,z
    networks:
      - dev_edge
    restart: unless-stopped
    stop_grace_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  dev_edge:
    name: compose_dev_edge
  backend_core:
    name: compose_backend_core
