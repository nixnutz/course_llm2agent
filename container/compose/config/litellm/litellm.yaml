# Synthetic spend: ~CPU / throughput proxy (not real USD). Slowest model = 10 per 1M
# tokens (input+output); each ~2× higher tokens/s → half the price per 1M (10→5→2.5→1.25).
# LiteLLM expects per-token rates: cost_per_token = (cost_per_1M) / 1_000_000.
model_list:
  # Chat / completion via Ollama's chat endpoint
  # release 11/2023
  - model_name: "ollama_chat/deepseek-coder:6.7b"
    litellm_params:
      model: "ollama_chat/deepseek-coder:6.7b"
      api_base: "os.environ/OLLAMA_API_BASE"
      max_retries: 0
      tags: ["ollama", "chat"]
    model_info:
      # ~2× vs 12b → 5 / 1M
      input_cost_per_token: 5e-6
      output_cost_per_token: 5e-6

  # release 01/2025 (R1-Distill-Qwen-7B)
  - model_name: "ollama_chat/deepseek-r1:7b"
    litellm_params:
      model: "ollama_chat/deepseek-r1:7b"
      api_base: "os.environ/OLLAMA_API_BASE"
      max_retries: 0
      tags: ["ollama", "chat", "reasoning"]
    model_info:
      # Same rough tier as other ~7b chat models → 5 / 1M
      input_cost_per_token: 5e-6
      output_cost_per_token: 5e-6

  # release 07/2024
  - model_name: "ollama_chat/llama3.1:8b"
    litellm_params:
      model: "ollama_chat/llama3.1:8b"
      api_base: "os.environ/OLLAMA_API_BASE"
      max_retries: 0
      tags: ["ollama", "chat"]
    model_info:
      input_cost_per_token: 5e-6
      output_cost_per_token: 5e-6

  # release 09/2024
  - model_name: "ollama_chat/llama3.2:1b"
    litellm_params:
      model: "ollama_chat/llama3.2:1b"
      api_base: "os.environ/OLLAMA_API_BASE"
      max_retries: 0
      tags: ["ollama", "chat"]
    model_info:
      input_cost_per_token: 1.25e-6
      output_cost_per_token: 1.25e-6

  # release 09/2024
  - model_name: "ollama_chat/llama3.2:3b"
    litellm_params:
      model: "ollama_chat/llama3.2:3b"
      api_base: "os.environ/OLLAMA_API_BASE"
      max_retries: 0
      tags: ["ollama", "chat"]
    model_info:
      # ~4× throughput vs 12b tier → 2.5 / 1M
      input_cost_per_token: 2.5e-6
      output_cost_per_token: 2.5e-6

  # release 07/2024
  - model_name: "ollama_chat/mistral-nemo:12b"
    litellm_params:
      model: "ollama_chat/mistral-nemo:12b"
      api_base: "os.environ/OLLAMA_API_BASE"
      max_retries: 0
      tags: ["ollama", "chat"]
    model_info:
      # Slowest in this stack → 10 / 1M
      input_cost_per_token: 1.0e-5
      output_cost_per_token: 1.0e-5

  # release 09/2023
  - model_name: "ollama_chat/mistral:7b"
    litellm_params:
      model: "ollama_chat/mistral:7b"
      api_base: "os.environ/OLLAMA_API_BASE"
      max_retries: 0
      tags: ["ollama", "chat"]
    model_info:
      # Same rough CPU tier as other ~7b chat models → 5 / 1M
      input_cost_per_token: 5e-6
      output_cost_per_token: 5e-6

  # release 11/2024
  - model_name: "ollama_chat/qwen2.5-coder:7b"
    litellm_params:
      model: "ollama_chat/qwen2.5-coder:7b"
      api_base: "os.environ/OLLAMA_API_BASE"
      max_retries: 0
      tags: ["ollama", "chat"]
    model_info:
      input_cost_per_token: 5e-6
      output_cost_per_token: 5e-6

  # release 09/2024
  - model_name: "ollama_chat/qwen2.5:1.5b"
    litellm_params:
