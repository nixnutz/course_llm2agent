      input_cost_per_token: 1.25e-6

  
  # Cloud models — rpm/tpm capped below provider free-tier ceilings (see compose/README.md).
  # Mistral limits are workspace-wide (all keys/models share one budget).

  # Gemini models
  # release 06/2025 — free tier ~15 RPM / 1M TPM (flash-lite)
  - model_name: gemini-2.5-flash-lite
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: "os.environ/GEMINI_API_KEY"
      max_retries: 0
      rpm: 10
      tpm: 900000

  # release 03/2025 (experimental); GA 06/2025 — free tier ~2 RPM / 32k TPM (pro)
  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: "os.environ/GEMINI_API_KEY"
      max_retries: 0
      rpm: 1
      tpm: 28000

  # Groq models — free tier ~30 RPM / 6k TPM per model
  # release 07/2024 (base: Llama 3.1 8B)
  - model_name: groq-llama-3.1-8b-instant
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: "os.environ/GROQ_API_KEY"
      max_retries: 0
      rpm: 25
      tpm: 5500

  # release 12/2024 (base: Llama 3.3 70B), decommissioned by Groq on 08/2026
  - model_name: groq-llama-3.3-70b
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: "os.environ/GROQ_API_KEY"
      max_retries: 0
      rpm: 25
      tpm: 5500

  # release 04/2026 (base: Qwen 3.6 27B)
  - model_name: groq-qwen3.6-27b
    litellm_params:
      model: groq/qwen/qwen3.6-27b
      api_key: "os.environ/GROQ_API_KEY"
      max_retries: 0
      rpm: 25
      tpm: 5500
      reasoning_format: "hidden" # hide reasoning in output - code does not handle it yet

  # Mistral models — Experiment/free ~2 RPM / 500k TPM (workspace, not per alias)
  # release 12/2025 (rolling alias; currently Mistral Large 3)
  - model_name: mistral-large
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: "os.environ/MISTRAL_API_KEY"
      max_retries: 0
      rpm: 2
      tpm: 400000

  # release 11/2024 (mistral-large-2411)
  - model_name: mistral-large-old
    litellm_params:
      model: mistral/mistral-large-2411
      api_key: "os.environ/MISTRAL_API_KEY"
      max_retries: 0
      rpm: 2
      tpm: 400000

  # release 06/2025 (rolling alias; currently Mistral Small 3.2)
  - model_name: mistral-small
    litellm_params:
      model: mistral/mistral-small-latest
      api_key: "os.environ/MISTRAL_API_KEY"
      max_retries: 0
      rpm: 2
      tpm: 400000


litellm_settings:
  # Emit JSON logs to stdout for easy "docker compose logs" tracing.
  json_logs: true
  # true: strip unsupported OpenAI-style params (better compatibility with SDKs/notebooks).
  # false surfaces mis-sent params but breaks clients that always send fields Ollama rejects.
  drop_params: true
  callbacks: ["arize_phoenix", "cloud_pacing_plugin.pacing_handler_instance"]

general_settings:
  store_model_in_db: true
  store_prompts_in_spend_logs: true
  maximum_spend_logs_retention_period: "7d"
  maximum_spend_logs_retention_interval: "1d"

router_settings:
  # Block before upstream when rpm/tpm budget is exhausted (429 from proxy, not provider).
  optional_pre_call_checks:
    - enforce_model_rate_limits
  # No router-level retries on cloud paths; models use max_retries: 0 above.
  num_retries: 0
  routing_strategy: "simple-shuffle" 