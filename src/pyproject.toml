[tool.ruff]
line-length = 100
target-version = "py311"
# Jupyter notebooks anywhere under src/ are not linted/formatted by make ruff.
extend-exclude = ["*.ipynb"]

[tool.ruff.lint]
# Import sorting (isort-compatible), aligned with pylint import-order expectations.
extend-select = ["I"]

[tool.ruff.lint.isort]
# stdlib -> third party -> first party/local (e.g. from .base import ...)
combine-as-imports = true
force-sort-within-sections = true
known-first-party = ["src", "reducer", "llm_nodes", "llm_handle"]

[tool.pytest.ini_options]
pythonpath = [".."]
asyncio_mode = "auto"
markers = [
    "unit: marks tests as unit tests",
    "smoke: marks tests as smoke tests",
    "integration: marks tests as integration tests",
    "eval: marks tests as eval/golden-set tests",
    "chaos: marks chaos/resilience integration tests (ADR 0011 L6)",
]
